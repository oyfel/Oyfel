
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Portal</title>
    
    <!-- Canonical Kang Tao Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23060606'/%3E%3Cpolygon points='10,14 90,14 82,56 10,56' fill='%23ff5500'/%3E%3Cpath d='M32,18 L32,24 M18,24 L46,24 M22,24 L22,50 M22,30 L42,30 M32,30 L32,42 M26,35 L38,35 M26,40 L38,40 M28,42 L22,48 M36,42 L42,48' stroke='%23060606' stroke-width='3.5' stroke-linecap='round' stroke-linejoin='round' fill='none'/%3E%3Cpath d='M52,21 L52,51 M52,24 C57,24 57,30 52,30 M52,30 C57,30 57,36 52,36 M60,24 L78,24 M64,29 L74,29 L74,41 L64,41 Z M64,35 L74,35 M69,41 L69,48 M61,48 L77,48' stroke='%23060606' stroke-width='3.5' stroke-linecap='round' stroke-linejoin='round' fill='none'/%3E%3C/svg%3E">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #060606;
            --orange-primary: #ff5500;
            --orange-glow: rgba(255, 85, 0, 0.3);
            --text-main: #ffffff;
            --text-muted: #888890;
            --border-color: #222226;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 2rem;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(rgba(255, 85, 0, 0.008) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 85, 0, 0.008) 1px, transparent 1px);
            background-size: 60px 60px;
            background-position: center;
            z-index: 0;
            pointer-events: none;
        }

        nav {
            width: 100%;
            padding: 1rem 0;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            background: transparent;
            z-index: 10;
            max-width: 600px;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            text-decoration: none;
            cursor: pointer;
        }

        .logo-img-wrapper {
            height: 38px;
            width: auto;
            display: block;
        }

        main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 1;
            max-width: 600px;
            width: 100%;
        }

        .support-container {
            background: #111113;
            border: 1px solid var(--border-color);
            padding: 3.5rem 2.5rem;
            border-radius: 16px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            width: 100%;
        }

        h1 {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 1.5rem;
            color: #ffffff;
        }

        .support-text {
            font-size: 1.05rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .email-link {
            display: inline-block;
            color: var(--orange-primary);
            font-weight: 700;
            text-decoration: none;
            border-bottom: 1px dashed var(--orange-primary);
            padding-bottom: 2px;
            transition: all 0.3s ease;
        }

        .email-link:hover {
            color: #ffffff;
            border-bottom-color: #ffffff;
            text-shadow: 0 0 10px var(--orange-glow);
        }

        .back-navigation {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .back-link {
            color: #ffffff;
            text-decoration: underline;
            text-underline-offset: 4px;
            font-weight: 700;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: var(--orange-primary);
        }

        @media (max-width: 480px) {
            .support-container { padding: 2.5rem 1.5rem; }
            h1 { font-size: 1.5rem; }
            .support-text { font-size: 0.95rem; }
            .back-navigation { font-size: 0.85rem; }
        }
    </style>
</head>
<body>

    <nav aria-label="E-Commerce Hub">
        <div class="nav-logo">
            <svg class="logo-img-wrapper" viewBox="0 0 310 70" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <polygon points="10,14 90,14 82,56 10,56" fill="#ff5500"/>
                <path d="M32,18 L32,24 M18,24 L46,24 M22,24 L22,50 M22,30 L42,30 M32,30 L32,42 M26,35 L38,35 M26,40 L38,40 M28,42 L22,48 M36,42 L42,48" stroke="#060606" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                <path d="M52,21 L52,51 M52,24 C57,24 57,30 52,30 M52,30 C57,30 57,36 52,36 M60,24 L78,24 M64,29 L74,29 L74,41 L64,41 Z M64,35 L74,35 M69,41 L69,48 M61,48 L77,48" stroke="#060606" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                <text x="110" y="38" font-family="'Plus Jakarta Sans', sans-serif" font-weight="900" font-size="28" fill="#ffffff" dominant-baseline="central">KANG</text>
                <text x="210" y="38" font-family="'Plus Jakarta Sans', sans-serif" font-weight="900" font-size="28" fill="#ff5500" dominant-baseline="central">TAO</text>
            </svg>
        </div>
    </nav>

    <main>
        <div class="support-container">
            <h1>Support Portal</h1>
            
            <p class="support-text">
                For assistance, please email us at <a href="mailto:help@kangtao.co" class="email-link">help@kangtao.co</a>
            </p>

            <div class="back-navigation">
                <a id="back-link-en" href="https://kangtao.co" class="back-link">Click here</a> to go back
            </div>
        </div>
    </main>

    <!-- Base spacers -->
</body>
</html>
