    <style>
        :root {
            --bg-color: #030304;
            --orange-primary: #ff5500;
            --orange-glow: rgba(255, 85, 0, 0.25);
            --orange-glow-intense: rgba(255, 85, 0, 0.6);
            --text-main: #ffffff;
            --text-muted: #888890;
            --border-color: rgba(255, 85, 0, 0.15);
            --card-bg: rgba(14, 14, 17, 0.75);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow-x: hidden;
            position: relative;
        }

        /* Ambient background lighting and grid */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: 
                radial-gradient(circle at 50% 40%, rgba(255, 85, 0, 0.07) 0%, transparent 60%),
                linear-gradient(rgba(255, 85, 0, 0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 85, 0, 0.015) 1px, transparent 1px);
            background-size: 100% 100%, 60px 60px, 60px 60px;
            background-position: center;
            z-index: 0;
            pointer-events: none;
        }

        main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            z-index: 1;
        }

        /* Centered Gateway Card Container with enhanced lighting */
        .gateway-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            padding: 4.5rem 3.5rem;
            border-radius: 24px;
            box-shadow: 
                0 30px 60px rgba(0, 0, 0, 0.8),
                0 0 50px rgba(255, 85, 0, 0.03);
            max-width: 580px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            position: relative;
            animation: pulseGlow 8s infinite ease-in-out;
        }

        /* Dynamic subtle background glow shift */
        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8), 0 0 50px rgba(255, 85, 0, 0.03); border-color: rgba(255, 85, 0, 0.15); }
            50% { box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8), 0 0 70px rgba(255, 85, 0, 0.08); border-color: rgba(255, 85, 0, 0.3); }
        }
