<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KANGTAO | System Offline</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Plus+Jakarta+Sans:wght@400;500;600&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #060606;
            --surface-color: #0f0f11;
            --orange-primary: #ff5500;
            --text-main: #ffffff;
            --text-muted: #707075;
            --border-color: #222226;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', 'Noto Sans SC', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Ambient background grid & glow */
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(rgba(255, 85, 0, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 85, 0, 0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: center;
            z-index: 0;
        }

        body::after {
            content: '';
            position: absolute;
            width: 450px;
            height: 450px;
            background: var(--orange-primary);
            filter: blur(180px);
            opacity: 0.08;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
        }

        /* Main Container with bottom fading shadow */
        .container {
            background: linear-gradient(180deg, var(--surface-color) 0%, rgba(15, 15, 17, 0.85) 80%, rgba(6, 6, 6, 0) 100%);
            border-top: 1px solid var(--border-color);
            border-left: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
            border-bottom: 1px solid transparent;
            padding: 4.5rem 3rem 5rem 3rem;
            border-radius: 20px 20px 0 0;
            text-align: center;
            max-width: 600px;
            width: 92%;
            position: relative;
            z-index: 1;
            backdrop-filter: blur(12px);
        }

        /* Branding Header Group */
        .brand-header-group {
            margin-bottom: 2.5rem;
        }

        .brand-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 0.6rem;
        }

        /* Logo Styling */
        .logo-zh, .logo-en {
            font-family: 'Orbitron', 'Noto Sans SC', sans-serif;
            font-size: 2.6rem;
            font-weight: 900;
            letter-spacing: 1px;
        }

        .logo-zh {
            font-weight: 700;
            letter-spacing: 4px;
        }

        .white-text {
            color: var(--text-main);
        }

        .orange-text {
            color: var(--orange-primary);
            text-shadow: 0 0 20px rgba(255, 85, 0, 0.25);
        }

        /* Slogan underneath logo */
        .slogan {
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 0.85rem;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 6px;
            text-indent: 6px; /* Offsets letter-spacing tracking to center properly */
            text-transform: uppercase;
        }

        /* Timeline Badge */
        .status-badge {
            display: inline-block;
            background: rgba(255, 85, 0, 0.07);
            border: 1px solid rgba(255, 85, 0, 0.25);
            color: var(--orange-primary);
            padding: 0.4rem 1.2rem;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 600;
            font-family: 'Orbitron', sans-serif;
            margin-bottom: 2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        h2 {
            font-size: 1.4rem;
            margin-bottom: 1rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            color: #ececee;
        }

        p {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.7;
            max-width: 440px;
            margin: 0 auto 4.5rem auto;
        }

        /* Bottom Tagline Styling */
        .tagline {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.25);
            letter-spacing: 3px;
            text-transform: uppercase;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            padding-top: 1.8rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Brand Identity Group -->
        <div class="brand-header-group">
            <div class="brand-container">
                <div class="logo-zh"><span class="white-text">康</span><span class="orange-text">陶</span></div>
                <div class="logo-en"><span class="white-text">KANG</span><span class="orange-text">TAO</span></div>
            </div>
            <!-- Subtitle directly below logo -->
            <div class="slogan">智能电子解决方案</div>
        </div>

        <!-- Launch Timeline -->
        <div class="status-badge">Deployment // Q3 2026</div>

        <h2>Next-Generation Infrastructure Loading</h2>
        <p>Our corporate web architecture is undergoing scheduled deployment upgrades. Full network systems will initialize shortly.</p>

        <!-- Bottom Tagline -->
        <div class="tagline">this is kangtao. This is intelligence.</div>
    </div>

</body>
</html>
